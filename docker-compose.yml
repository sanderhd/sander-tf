services:
  db:
    image: postgres:16
    ports:
      - "5432:5432"
    container_name: sander-tf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: sander-tf
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal

  web:
    build: .
    container_name: sander-tf-web
    restart: unless-stopped
    depends_on:
      - db
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/sander-tf?schema=public
    ports:
      - "3000:3000"
    networks:
      - internal

volumes:
  pgdata:
  thumbnails:

networks:
  internal: